<h1><strong>Life Drop</strong></h1>
<p>Connecting donors with those in need</p>

<hr>

<h2><i>Donate Blood</i></h2>
<p>Fill the form below to register as a blood donor.</p>

<form>

<label>Full Name:</label><br>
<input type="text"><br><br>

<label>Blood Group:</label><br>
<select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select><br><br>

<label>Phone Number:</label><br>
<input type="tel"><br><br>

<label>City:</label><br>
<input type="text"><br><br>

<input type="submit" value="Register">

</form>

<hr>

<p>Made with ❤️ to save lives</p>
<p>Contact: LifeDrop@gmail.com</p>

</body>

</html>
