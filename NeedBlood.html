<!DOCTYPE html>
<html>
<head>
<title>Need Blood - Life Drop</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav>
<h1>Life Drop</h1>
<p>Connecting donors with those in need</p>
</nav>

<section>
<h2 class="title">Request Blood</h2>
<p class="subtitle">Please fill the form below to request blood from donors.</p>
</section>

<section class="form-container">

<form class="blood-form">

<div class="grid-3">

<input type="text" placeholder="Patient Name" required>

<select required>
<option value="">Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
<option>other</option>
</select>

<input type="number" placeholder="Units Required" required>

<input type="date" required>

<input type="text" placeholder="Hospital Name ">

<input type="text" placeholder="City / Location" required>

<input type="text" placeholder=" Phone Number 1" required>

<input type="tel" placeholder="Phone Number 2 (Optional)">

<input type="email" placeholder="Email (Optional)">

<textarea class="message-box" placeholder="Additional Message (Optional)"></textarea>

</div>

<div class="submit-box">
<button type="submit">Submit Request</button>
</div>

</form>

</section>

<footer>
<p>Made with ❤️ to save lives</p>
<p>Contact us: LifeDrop@gmail.com</p>
</footer>

</body>
</html>
