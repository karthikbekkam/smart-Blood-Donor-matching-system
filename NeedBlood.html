<!DOCTYPE html>
<html>

<head>
    <title>Need Blood - Life Drop</title>
    <link rel="stylesheet" href="css/need.css">
    <meta charset="UTF-8">
</head>

<body>

<nav>
    <h1>Life Drop</h1>
    <p>Connecting donors with those in need</p>
</nav>

<section>
    <h2>Need Blood</h2>
    <p>Fill the form below to request blood.</p>

    <div class="form-container">

        <form>

            <div class="grid-2x3">

                <input type="text" placeholder="Full Name" required>

                <input type="tel" placeholder="Phone Number" required>

                <select required>
                    <option value="">Blood Group</option>
                    <option>A+</option>
                    <option>B+</option>
                    <option>O+</option>
                    <option>AB+</option>
                    <option>A-</option>
                    <option>B-</option>
                    <option>O-</option>
                    <option>AB-</option>
                </select>

                <input type="text" placeholder="City" required>

                <input type="number" placeholder="Units Required" required>

                <input type="date" required>

            </div>

            <textarea class="message-box" placeholder="Additional Message"></textarea>

            <div class="submit-box">
                <button type="submit">Request Blood</button>
            </div>

        </form>

    </div>
</section>

<footer>
    <p>Made with ❤️ to save lives</p>
    <p>Contact us: LifeDrop@gmail.com</p>
</footer>

</body>

</html>
