<!DOCTYPE html>
<html>

<head>
<title>Need Blood - Life Drop</title>
<link rel="stylesheet" href="css/need.css">
<meta charset="UTF-8">
</head>

<body>

<h1><strong>Life Drop</strong></h1>
<p>Connecting donors with those in need</p>

<hr>

<h2><i>Need Blood</i></h2>
<p>Fill the form below to request blood.</p>

<div class="form-container">

<form>

<div class="grid-2x3">

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Phone Number">

<select>
<option>Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>

<input type="text" placeholder="City">

<input type="number" placeholder="Units Required">

<input type="date">

</div>

<textarea class="message-box" placeholder="Additional Message"></textarea>

<div class="submit-box">
<button type="submit">Request Blood</button>
</div>

</form>

</div>

<hr>

<p>Made with ❤️ to save lives</p>
<p>Contact: LifeDrop@gmail.com</p>

</body>

</html>
